[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/bootstrap"
  to = "/.netlify/functions/bootstrap"
  status = 200

[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/queue"
  to = "/.netlify/functions/queue"
  status = 200

[[redirects]]
  from = "/api/generate-text"
  to = "/.netlify/functions/generate-text"
  status = 200

[[redirects]]
  from = "/api/generate-image"
  to = "/.netlify/functions/generate-image"
  status = 200

[[redirects]]
  from = "/api/generate-video"
  to = "/.netlify/functions/generate-video"
  status = 200

[[redirects]]
  from = "/api/video-status"
  to = "/.netlify/functions/video-status"
  status = 200

[[redirects]]
  from = "/api/video-download"
  to = "/.netlify/functions/video-download"
  status = 200
